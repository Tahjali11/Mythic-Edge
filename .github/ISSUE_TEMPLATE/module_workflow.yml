name: Module workflow
description: Shape a Mythic Edge module, workflow, or constitution change before implementation.
title: "[module] "
labels: ["workflow:problem"]
body:
  - type: markdown
    attributes:
      value: |
        Use this issue for the problem representation step. A separate contract should be produced before implementation starts when the risk tier requires one.

        Agent docs:
        - `AGENTS.md`
        - `docs/agent_rules.yml`
        - `docs/agent_constitution.md`
        - `docs/codex_module_workflow.md`
        - `docs/agent_threads/problem_representation.md`
        - `docs/agent_threads/module_contract.md`
        - `docs/agent_threads/implementation.md`
        - `docs/agent_threads/module_fixer.md`
        - `docs/agent_threads/review.md`
        - `docs/agent_threads/contract_test.md`
        - `docs/agent_threads/module_submitter.md`
        - `docs/agent_threads/integration_deployer.md`
        - `docs/templates/problem_representation.md`
        - `docs/templates/workflow_handoff.md`
        - `docs/templates/current_status.md`
  - type: input
    id: repository
    attributes:
      label: Repository
      description: GitHub owner/name slug for the repository that owns this issue.
      placeholder: Tahjali11/Mythic-Edge
    validations:
      required: true
  - type: input
    id: repository_url
    attributes:
      label: Repository URL
      description: Public HTTPS URL for the repository that owns this issue. Do not include local worktree paths.
      placeholder: https://github.com/Tahjali11/Mythic-Edge
    validations:
      required: true
  - type: input
    id: tracker
    attributes:
      label: Tracker issue
      description: Parent tracker or queue issue, if any.
      placeholder: "#5"
    validations:
      required: false
  - type: dropdown
    id: risk_tier
    attributes:
      label: Risk tier
      description: Use the definitions in docs/agent_constitution.md.
      options:
        - Low
        - Medium
        - High
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two sentences describing the bug, feature, audit target, or confusing behavior.
    validations:
      required: true
  - type: textarea
    id: intended
    attributes:
      label: What the code or workflow is supposed to do
      description: Describe the intended behavior in plain English.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: What it is actually doing
      description: Include the exact bad output, missing output, confusing state, or workflow gap if known.
    validations:
      required: true
  - type: dropdown
    id: layer
    attributes:
      label: Primary project layer
      options:
        - MTGA raw log source
        - parser and state interpretation
        - webhook / transport layer
        - workbook landing sheets
        - helper formulas
        - dashboard / reporting tabs
        - AI analysis
        - repository coordination and agent workflow
    validations:
      required: true
  - type: dropdown
    id: internal_project_area
    attributes:
      label: Internal project area
      description: >-
        Optional ADR-0006 routing vocabulary from docs/internal_project_map.md.
        Future AI Integration is deferred vocabulary only and does not authorize
        OpenAI or model-provider runtime integration, AI coaching evaluation,
        AI-owned parser truth, AI-owned analytics truth, hidden-card truth,
        gameplay correctness truth, or strategic certainty.
      options:
        - N/A / unclear
        - Parser
        - Corpus / Provenance
        - Analytics
        - Local App / UI
        - Workbook / Transport
        - Quality / Governance
        - Future AI Integration
        - Shared Support
        - Generated / Local Artifacts
        - External / Collaboration Surface
    validations:
      required: false
  - type: textarea
    id: first_bad_value
    attributes:
      label: First bad value or first place to inspect
      description: Name where the data or workflow first becomes wrong or ambiguous. If unknown, list the inspection order.
    validations:
      required: true
  - type: textarea
    id: expected_output
    attributes:
      label: Expected output
      description: List parser fields, webhook rows, workbook columns, visible dashboard effect, docs artifact, issue/PR state, or tracker update expected.
    validations:
      required: true
  - type: textarea
    id: source_artifacts
    attributes:
      label: Source artifacts
      description: Link or list contracts, problem representations, logs, workbook tabs, PRs, reports, or draft docs the next role should read.
    validations:
      required: false
  - type: textarea
    id: target_artifact
    attributes:
      label: Target artifact
      description: Name the durable artifact expected from this issue, such as a contract, implementation handoff, contract-test report, PR, or tracker update.
    validations:
      required: false
  - type: input
    id: base_branch
    attributes:
      label: Base branch
      description: Branch the work should start from or compare against.
      placeholder: main
    validations:
      required: false
  - type: input
    id: target_branch
    attributes:
      label: Target branch
      description: Branch future PR or deployer work should target.
      placeholder: main
    validations:
      required: false
  - type: input
    id: branch
    attributes:
      label: Working branch
      description: Current or expected working branch, when different from base/target.
      placeholder: codex/parser-module-audit-suite
    validations:
      required: false
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What is in scope and out of scope?
    validations:
      required: true
  - type: textarea
    id: protected_surfaces
    attributes:
      label: Protected surfaces and forbidden changes
      description: Name any protected-surface bundles or explicit surfaces that must not change.
      value: |
        Do not change workbook schema, webhook payload shape, Apps Script behavior, parser event classes, parser state final reconciliation, extractor behavior, match identity, game identity, deduplication, secrets, environment variables, raw logs, generated data, runtime status files, transport failure artifacts, or workbook exports unless the contract explicitly authorizes it.
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation evidence needed
      description: Which focused tests, replay checks, docs checks, YAML parse checks, CI checks, or visible workbook checks would prove the work succeeded?
    validations:
      required: true
  - type: textarea
    id: stop_conditions
    attributes:
      label: Stop conditions
      description: List conditions that should route back to Thinker, Contract Writer, Reviewer, or the user instead of proceeding.
    validations:
      required: false
