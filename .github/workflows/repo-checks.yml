name: Repo Checks

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install package and dev dependencies
        run: |
          py -m pip install --upgrade pip
          py -m pip install -e .[dev]

      - name: Run tests with global line coverage floor
        shell: pwsh
        run: |
          $coverageRunId = "repo-checks"
          $coverageRoot = "_review_/quality_coverage_global_line_floor/$coverageRunId"
          $coverageXml = "$coverageRoot/coverage.xml"
          $env:COVERAGE_FILE = "$coverageRoot/.coverage"
          py -m pytest -q tests `
            --cov=src/mythic_edge_parser `
            --cov-report=term-missing `
            --cov-report="xml:$coverageXml"
          $testExit = $LASTEXITCODE
          if ($testExit -ne 0) {
            Remove-Item Env:\COVERAGE_FILE -ErrorAction SilentlyContinue
            exit $testExit
          }
          py tools/check_coverage_floor.py `
            --coverage-xml $coverageXml `
            --line-floor 85 `
            --protected-surface-group parser_state_final_reconciliation `
            --protected-surface-line-floor 88 `
            --command-label "GitHub Actions repo checks"
          $coverageExit = $LASTEXITCODE
          Remove-Item Env:\COVERAGE_FILE -ErrorAction SilentlyContinue
          exit $coverageExit

      - name: Run protected surface gate
        if: github.event_name == 'pull_request'
        run: py tools/check_protected_surfaces.py --base origin/${{ github.base_ref }}

      - name: Run lint checks
        run: py -m ruff check src tests tools
